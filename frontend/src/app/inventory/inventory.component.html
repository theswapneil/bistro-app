<div class="inventory-container">
    <mat-card>
        <h2>Inventory Management</h2>
        <form [formGroup]="form" (ngSubmit)="save()">
            <mat-form-field class="full-width">
                <mat-label>Item Name</mat-label>
                <input matInput formControlName="item_name" required />
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Quantity</mat-label>
                <input matInput type="number" formControlName="quantity" required />
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Price</mat-label>
                <input matInput type="number" formControlName="price" required />
            </mat-form-field>
            <button mat-raised-button color="primary" type="submit">{{ editing ? 'Update' : 'Add' }}</button>
            <button mat-button type="button" (click)="cancel()" *ngIf="editing">Cancel</button>
        </form>
    </mat-card>
    <mat-card>
        <h3>Inventory List</h3>
        <table mat-table [dataSource]="items" class="mat-elevation-z8 full-width">
            <ng-container matColumnDef="item_name">
                <th mat-header-cell *matHeaderCellDef>Item</th>
                <td mat-cell *matCellDef="let item">{{ item.item_name }}</td>
            </ng-container>
            <ng-container matColumnDef="quantity">
                <th mat-header-cell *matHeaderCellDef>Qty</th>
                <td mat-cell *matCellDef="let item">{{ item.quantity }}</td>
            </ng-container>
            <ng-container matColumnDef="price">
                <th mat-header-cell *matHeaderCellDef>Price</th>
                <td mat-cell *matCellDef="let item">{{ item.price | currency }}</td>
            </ng-container>
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let item">
                    <button mat-button color="accent" (click)="edit(item)">Edit</button>
                    <button mat-button color="warn" (click)="delete(item)">Delete</button>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="['item_name', 'quantity', 'price', 'actions']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['item_name', 'quantity', 'price', 'actions'];"></tr>
        </table>
    </mat-card>
</div>
