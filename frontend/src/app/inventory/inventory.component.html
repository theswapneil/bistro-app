<div class="inventory-container">
    <mat-card>
        <div class="inventory-header">
            <h2>Inventory Management</h2>
            <button mat-raised-button color="primary" (click)="openForm()">Add Item</button>
        </div>
        <div *ngIf="error" class="error">{{ error }}</div>
    </mat-card>
    <mat-card>
        <h3>Inventory List</h3>
        <table mat-table [dataSource]="items()" class="mat-elevation-z8 full-width">
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Item</th>
                <td mat-cell *matCellDef="let item">{{ item.name }}</td>
            </ng-container>
            <ng-container matColumnDef="quantity">
                <th mat-header-cell *matHeaderCellDef>Qty</th>
                <td mat-cell *matCellDef="let item">{{ item.quantity }}</td>
            </ng-container>
            <ng-container matColumnDef="buying_price">
                <th mat-header-cell *matHeaderCellDef>Buying Price</th>
                <td mat-cell *matCellDef="let item">{{ item.buying_price | currency:'INR' }}</td>
            </ng-container>
            <ng-container matColumnDef="selling_price">
                <th mat-header-cell *matHeaderCellDef>Selling Price</th>
                <td mat-cell *matCellDef="let item">{{ item.selling_price | currency:'INR' }}</td>
            </ng-container>
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let item">
                    <button mat-raised-button color="primary" (click)="openForm(item)">Add stock</button>
                    <button mat-raised-button color="warn" (click)="delete(item)">Delete</button>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="['name', 'quantity', 'buying_price', 'selling_price', 'actions']"></tr>
            <tr mat-row
                *matRowDef="let row; columns: ['name', 'quantity', 'buying_price', 'selling_price', 'actions'];"></tr>
        </table>
    </mat-card>
</div>
