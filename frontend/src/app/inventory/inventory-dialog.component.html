<h2 mat-dialog-title style="margin:0">{{ title }}</h2>
<form [formGroup]="form" (ngSubmit)="save()">
    <mat-dialog-content>
        @if(data?.isDelete) {
        <p>Are you sure you want to delete <strong>{{ data.item?.item_name }}</strong> from the Inventory?</p>
        }
        @else {
        <mat-form-field class="full-width">
            <mat-label>Item Name</mat-label>
            <input matInput formControlName="item_name" required [matAutocomplete]="auto" />
            <mat-autocomplete #auto="matAutocomplete" (optionSelected)="onOptionSelected($event)">
                <mat-option *ngFor="let option of filteredOptions | async" [value]="option">
                    {{option.item_name}}
                </mat-option>
            </mat-autocomplete>
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Quantity</mat-label>
            <input matInput type="number" formControlName="quantity" required />
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Price</mat-label>
            <input matInput type="number" formControlName="price" required />
        </mat-form-field>
        }
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button mat-button type="button" (click)="cancel()">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            {{ data?.isDelete ? 'Delete' : (data?.item ? 'Update' : 'Add') }}
        </button>
    </mat-dialog-actions>
</form>
