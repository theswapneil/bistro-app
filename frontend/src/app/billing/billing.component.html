<div class="billing-container">
    <mat-card>
        <h2>Generate Bill</h2>
        <div *ngIf="error" class="error">{{ error }}</div>
        <form [formGroup]="billForm" (ngSubmit)="generateBill()">
            <mat-form-field class="full-width">
                <mat-label>Table Number</mat-label>
                <input matInput formControlName="table_number" required />
            </mat-form-field>
            <button mat-raised-button color="primary" type="submit">Generate</button>
        </form>
    </mat-card>
    @if(bill(); as b) {
    <mat-card>
        <h3>Bill for Table {{ b.table_number }}</h3>
        <div *ngFor="let item of b.items">
            {{ item.name }} x{{ item.qty }} - {{ item.price | currency:'INR' }}
        </div>
        <div>
            TAX: - {{ b.tax | currency:'INR' }}
        </div>
        <div class="total">Total: {{ b.final_amount | currency:'INR' }}</div>
    </mat-card>
    }
</div>
